name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  # ── Linux x86_64 ──────────────────────────────────────────────────────────
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libasound2-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libfreetype-dev libfontconfig1-dev libgl1-mesa-dev

      - uses: actions/checkout@v4
        with:
          path: Gloubiboulga

      - uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.12
          path: JUCE

      - name: Checkout FxmeJuceTools
        uses: actions/checkout@v4
        with:
          repository: odoare/FxmeJuceTools
          path: _fxme_tmp

      - name: Install FxmeJuceTools module
        shell: bash
        run: |
          mkdir -p JUCE/usermodules
          mv _fxme_tmp/module/FxmeJuceTools JUCE/usermodules/FxmeJuceTools

      - name: Configure & Build
        run: |
          cmake -B Gloubiboulga/build -S Gloubiboulga -DCMAKE_BUILD_TYPE=Release
          cmake --build Gloubiboulga/build --config Release --parallel

      - name: Package
        run: |
          cd Gloubiboulga/build/Gloubiboulga_artefacts/Release
          zip -r ${{ github.workspace }}/Gloubiboulga-VST3-Linux-x86_64.zip VST3/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: Gloubiboulga-VST3-Linux-x86_64.zip

  # ── Linux arm64 ───────────────────────────────────────────────────────────
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libasound2-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libfreetype-dev libfontconfig1-dev libgl1-mesa-dev

      - uses: actions/checkout@v4
        with:
          path: Gloubiboulga

      - uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.12
          path: JUCE

      - name: Checkout FxmeJuceTools
        uses: actions/checkout@v4
        with:
          repository: odoare/FxmeJuceTools
          path: _fxme_tmp

      - name: Install FxmeJuceTools module
        shell: bash
        run: |
          mkdir -p JUCE/usermodules
          mv _fxme_tmp/module/FxmeJuceTools JUCE/usermodules/FxmeJuceTools

      - name: Configure & Build
        run: |
          cmake -B Gloubiboulga/build -S Gloubiboulga -DCMAKE_BUILD_TYPE=Release
          cmake --build Gloubiboulga/build --config Release --parallel

      - name: Package
        run: |
          cd Gloubiboulga/build/Gloubiboulga_artefacts/Release
          zip -r ${{ github.workspace }}/Gloubiboulga-VST3-Linux-arm64.zip VST3/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: Gloubiboulga-VST3-Linux-arm64.zip

  # ── Windows x86_64 ────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: Gloubiboulga

      - uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.12
          path: JUCE

      - name: Checkout FxmeJuceTools
        uses: actions/checkout@v4
        with:
          repository: odoare/FxmeJuceTools
          path: _fxme_tmp

      - name: Install FxmeJuceTools module
        shell: bash
        run: |
          mkdir -p JUCE/usermodules
          mv _fxme_tmp/module/FxmeJuceTools JUCE/usermodules/FxmeJuceTools

      - name: Configure & Build
        run: |
          cmake -B Gloubiboulga/build -S Gloubiboulga -G "Visual Studio 17 2022"
          cmake --build Gloubiboulga/build --config Release --parallel

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build installer
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          cp -r "Gloubiboulga/build/Gloubiboulga_artefacts/Release/VST3/Gloubiboulga.vst3" \
                "Gloubiboulga/packaging/windows/"
          cd Gloubiboulga/packaging/windows
          makensis -DVERSION="$VERSION" installer.nsi

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: Gloubiboulga/packaging/windows/Gloubiboulga-Windows-Setup.exe

  # ── macOS universal (arm64 + x86_64) ──────────────────────────────────────
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          path: Gloubiboulga

      - uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.12
          path: JUCE

      - name: Checkout FxmeJuceTools
        uses: actions/checkout@v4
        with:
          repository: odoare/FxmeJuceTools
          path: _fxme_tmp

      - name: Install FxmeJuceTools module
        shell: bash
        run: |
          mkdir -p JUCE/usermodules
          mv _fxme_tmp/module/FxmeJuceTools JUCE/usermodules/FxmeJuceTools

      - name: Configure & Build
        run: |
          cmake -B Gloubiboulga/build -S Gloubiboulga -DCMAKE_BUILD_TYPE=Release
          cmake --build Gloubiboulga/build --config Release --parallel

      - name: Verify universal binary
        run: |
          lipo -info "Gloubiboulga/build/Gloubiboulga_artefacts/Release/VST3/Gloubiboulga.vst3/Contents/MacOS/Gloubiboulga"

      - name: Build pkg installer
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          # Populate the pkg root with both formats
          mkdir -p pkg_root/Library/Audio/Plug-Ins/VST3
          mkdir -p pkg_root/Library/Audio/Plug-Ins/Components
          cp -r "Gloubiboulga/build/Gloubiboulga_artefacts/Release/VST3/Gloubiboulga.vst3" \
                "pkg_root/Library/Audio/Plug-Ins/VST3/"
          cp -r "Gloubiboulga/build/Gloubiboulga_artefacts/Release/AU/Gloubiboulga.component" \
                "pkg_root/Library/Audio/Plug-Ins/Components/"

          pkgbuild \
            --root pkg_root \
            --identifier com.FXMechanics.Gloubiboulga \
            --version "$VERSION" \
            --install-location / \
            Gloubiboulga-macOS.pkg

          # ── Code-signing + notarization (requires Apple Developer account) ──
          # Uncomment and populate the repository secrets to enable:
          #
          # echo "$APPLE_CERT_P12" | base64 --decode > cert.p12
          # security create-keychain -p "" build.keychain
          # security import cert.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          # security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          # codesign --deep --force --timestamp --options runtime \
          #          --sign "Developer ID Application: Your Name (TEAMID)" \
          #          pkg_root/Library/Audio/Plug-Ins/VST3/Gloubiboulga.vst3
          # codesign --deep --force --timestamp --options runtime \
          #          --sign "Developer ID Application: Your Name (TEAMID)" \
          #          pkg_root/Library/Audio/Plug-Ins/Components/Gloubiboulga.component
          # productsign --sign "Developer ID Installer: Your Name (TEAMID)" \
          #             Gloubiboulga-macOS.pkg Gloubiboulga-macOS-signed.pkg
          # xcrun notarytool submit Gloubiboulga-macOS-signed.pkg \
          #   --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          # xcrun stapler staple Gloubiboulga-macOS-signed.pkg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: Gloubiboulga-macOS.pkg

      - name: Package raw zips (for advanced users)
        run: |
          cd Gloubiboulga/build/Gloubiboulga_artefacts/Release
          zip -r ${{ github.workspace }}/Gloubiboulga-VST3-macOS-universal.zip VST3/
          zip -r ${{ github.workspace }}/Gloubiboulga-AU-macOS-universal.zip AU/

      - uses: actions/upload-artifact@v4
        with:
          name: macos-vst3
          path: Gloubiboulga-VST3-macOS-universal.zip

      - uses: actions/upload-artifact@v4
        with:
          name: macos-au
          path: Gloubiboulga-AU-macOS-universal.zip

  # ── Publish GitHub Release ────────────────────────────────────────────────
  release:
    needs: [build-linux-x86_64, build-linux-arm64, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.zip
            artifacts/*.pkg
            artifacts/*.exe
          generate_release_notes: true
