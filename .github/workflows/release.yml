name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  # ── Linux x86_64 ──────────────────────────────────────────────────────────
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libasound2-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libfreetype-dev libfontconfig1-dev libgl1-mesa-dev

      - uses: actions/checkout@v4
        with:
          path: Gloubiboulga

      - uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.12
          path: JUCE

      - name: Checkout FxmeJuceTools
        uses: actions/checkout@v4
        with:
          repository: odoare/FxmeJuceTools
          path: _fxme_tmp

      - name: Install FxmeJuceTools module
        shell: bash
        run: |
          mkdir -p JUCE/usermodules
          mv _fxme_tmp/module/FxmeJuceTools JUCE/usermodules/FxmeJuceTools

      - name: Configure & Build
        run: |
          cmake -B Gloubiboulga/build -S Gloubiboulga -DCMAKE_BUILD_TYPE=Release
          cmake --build Gloubiboulga/build --config Release --parallel

      - name: Package
        run: |
          cd Gloubiboulga/build/Gloubiboulga_artefacts/Release
          zip -r ${{ github.workspace }}/Gloubiboulga-VST3-Linux-x86_64.zip VST3/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: Gloubiboulga-VST3-Linux-x86_64.zip

  # ── Linux arm64 ───────────────────────────────────────────────────────────
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libasound2-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libfreetype-dev libfontconfig1-dev libgl1-mesa-dev

      - uses: actions/checkout@v4
        with:
          path: Gloubiboulga

      - uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.12
          path: JUCE

      - name: Checkout FxmeJuceTools
        uses: actions/checkout@v4
        with:
          repository: odoare/FxmeJuceTools
          path: _fxme_tmp

      - name: Install FxmeJuceTools module
        shell: bash
        run: |
          mkdir -p JUCE/usermodules
          mv _fxme_tmp/module/FxmeJuceTools JUCE/usermodules/FxmeJuceTools

      - name: Configure & Build
        run: |
          cmake -B Gloubiboulga/build -S Gloubiboulga -DCMAKE_BUILD_TYPE=Release
          cmake --build Gloubiboulga/build --config Release --parallel

      - name: Package
        run: |
          cd Gloubiboulga/build/Gloubiboulga_artefacts/Release
          zip -r ${{ github.workspace }}/Gloubiboulga-VST3-Linux-arm64.zip VST3/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: Gloubiboulga-VST3-Linux-arm64.zip

  # ── Windows x86_64 ────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: Gloubiboulga

      - uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.12
          path: JUCE

      - name: Checkout FxmeJuceTools
        uses: actions/checkout@v4
        with:
          repository: odoare/FxmeJuceTools
          path: _fxme_tmp

      - name: Install FxmeJuceTools module
        shell: bash
        run: |
          mkdir -p JUCE/usermodules
          mv _fxme_tmp/module/FxmeJuceTools JUCE/usermodules/FxmeJuceTools

      - name: Configure & Build
        run: |
          cmake -B Gloubiboulga/build -S Gloubiboulga -G "Visual Studio 17 2022"
          cmake --build Gloubiboulga/build --config Release --parallel

      - name: Package
        run: |
          Compress-Archive `
            -Path "Gloubiboulga/build/Gloubiboulga_artefacts/Release/VST3" `
            -DestinationPath "Gloubiboulga-VST3-Windows-x86_64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: Gloubiboulga-VST3-Windows-x86_64.zip

  # ── macOS universal (arm64 + x86_64) ──────────────────────────────────────
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          path: Gloubiboulga

      - uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.12
          path: JUCE

      - name: Checkout FxmeJuceTools
        uses: actions/checkout@v4
        with:
          repository: odoare/FxmeJuceTools
          path: _fxme_tmp

      - name: Install FxmeJuceTools module
        shell: bash
        run: |
          mkdir -p JUCE/usermodules
          mv _fxme_tmp/module/FxmeJuceTools JUCE/usermodules/FxmeJuceTools

      - name: Configure & Build
        run: |
          cmake -B Gloubiboulga/build -S Gloubiboulga -DCMAKE_BUILD_TYPE=Release
          cmake --build Gloubiboulga/build --config Release --parallel

      - name: Verify universal binary
        run: |
          lipo -info "Gloubiboulga/build/Gloubiboulga_artefacts/Release/VST3/Gloubiboulga.vst3/Contents/MacOS/Gloubiboulga"

      - name: Package
        run: |
          cd Gloubiboulga/build/Gloubiboulga_artefacts/Release
          zip -r ${{ github.workspace }}/Gloubiboulga-VST3-macOS-universal.zip VST3/
          zip -r ${{ github.workspace }}/Gloubiboulga-AU-macOS-universal.zip AU/

      - uses: actions/upload-artifact@v4
        with:
          name: macos-vst3
          path: Gloubiboulga-VST3-macOS-universal.zip

      - uses: actions/upload-artifact@v4
        with:
          name: macos-au
          path: Gloubiboulga-AU-macOS-universal.zip

  # ── Publish GitHub Release ────────────────────────────────────────────────
  release:
    needs: [build-linux-x86_64, build-linux-arm64, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
